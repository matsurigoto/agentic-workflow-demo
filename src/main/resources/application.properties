# TaskFlow Configuration
# Last updated: 2021-03-15 by kevin

server.port=8080

# Database - H2 for dev, MySQL for prod
# TODO: use profiles instead of commenting out
spring.datasource.url=jdbc:h2:mem:taskflow
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# MySQL prod config (DO NOT UNCOMMENT IN DEV)
#spring.datasource.url=jdbc:mysql://prod-db.internal:3306/taskflow
#spring.datasource.username=taskflow_admin
#spring.datasource.password=Tf@2021!Pr0d
#spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# File upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# FIXME: CORS is wide open, need to restrict
# app.cors.allowed-origins=*

# App settings
app.jwt.secret=mySecretKey123456789012345678901234567890
app.jwt.expiration=86400000
app.upload.dir=/tmp/taskflow-uploads
app.max.tasks.per.user=1000
app.admin.email=admin@taskflow.local
app.notification.enabled=false
# app.rate.limit=100

# Logging
logging.level.root=INFO
logging.level.com.taskflow=DEBUG
logging.level.org.hibernate.SQL=DEBUG
